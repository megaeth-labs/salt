name: perf-regression

on:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  perf-pr:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly-2026-03-20
          cache-shared-key: perf-${{ hashFiles('**/Cargo.lock') }}

      - name: Run cargo bench
        run: cargo bench -- "update 10000 KVs" | tee output.txt

      - name: Parse current PR benchmark
        run: python3 scripts/perf/parse_cargo_bench.py output.txt current-pr.json

      - name: Download latest main baseline
        run: |
          git fetch origin gh-pages
          git show origin/gh-pages:benchmarks/latest-main.json > latest-main.json
          python3 -m json.tool latest-main.json >/dev/null

      - name: Render PR benchmark report
        run: python3 scripts/perf/render_pr_report.py latest-main.json current-pr.json report

      - name: Upload PR benchmark report
        id: upload_pr_benchmark_report
        uses: actions/upload-artifact@v4
        with:
          name: pr-benchmark-report
          path: report

      - name: Publish step summary
        run: cat report/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR with artifact link
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const summary = fs.readFileSync("report/summary.md", "utf8");
            const artifactUrl = "${{ steps.upload_pr_benchmark_report.outputs.artifact-url }}";
            const body = [
              summary.trim(),
              "",
              `- Download the [pr-benchmark-report artifact](${artifactUrl}) to inspect the HTML comparison chart.`
            ].join("\n");

            const marker = "<!-- perf-regression-report -->";
            const markedBody = marker + "\n" + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: markedBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: markedBody,
              });
            }
