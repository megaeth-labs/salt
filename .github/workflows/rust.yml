on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

name: Rust

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2
      - name: Install toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: perf-${{ hashFiles('**/Cargo.lock') }}

      - name: Run cargo check
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: --all-targets

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2

      - name: Install toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: perf-${{ hashFiles('**/Cargo.lock') }}

      - name: Run cargo test
        uses: actions-rs/cargo@v1
        with:
          command: test

      - name: Run cargo test with bucket resize feature
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --features test-bucket-resize
        env:
          NUM_DATA_BUCKETS: 2
          BUCKET_RESIZE_LOAD_FACTOR_PCT: 1

      - name: Run random stress test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: -p salt --features test-bucket-resize test_e2e_random_stress -- --ignored --nocapture
        env:
          NUM_DATA_BUCKETS: 2
          BUCKET_RESIZE_LOAD_FACTOR_PCT: 80
          RANDOM_KV_POOL_SIZE: 4096
          RANDOM_ITERATIONS: 100
          RANDOM_BLOCKS: 3
          RANDOM_MINI_BLOCKS: 10
          RANDOM_OPS: 100
          RANDOM_LOOKUPS: 50

  test-no-std:
    name: Test no_std
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2

      - name: Install nightly toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: nightly
          override: true
          target: riscv64imac-unknown-none-elf

      - name: Run cargo check for no_std target
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: -p salt --target riscv64imac-unknown-none-elf --no-default-features

      - name: Run cargo test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --no-default-features

      - name: Run cargo test with bucket resize feature
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --no-default-features --features test-bucket-resize

  lints:
    name: Lints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v2

      - name: Install toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: perf-${{ hashFiles('**/Cargo.lock') }}

      - name: Run cargo fmt
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check

      - name: Run cargo clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: --all-targets -- -D warnings
