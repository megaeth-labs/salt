name: Mutation Testing

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  cargo-mutants:
    name: cargo-mutants gate
    runs-on: ubuntu-24.04
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants@27.1.0

      - name: Warm test binaries
        run: cargo nextest run -p salt --no-default-features --features parallel --no-run

      - name: Run mutation testing
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            scripts/mutation_test.sh diff "${{ github.event.pull_request.base.sha }}"
          else
            scripts/mutation_test.sh full
          fi

      - name: Score and gate
        run: |
          python3 scripts/mutation_gate.py report \
            --results target/mutants/mutants.out \
            --suppressions mutants/suppressions.toml \
            --comment mutation-report.md \
            --summary "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            let body;
            try {
              body = fs.readFileSync("mutation-report.md", "utf8");
            } catch {
              body = "## Mutation testing\n\nNo report produced.";
            }
            const marker = "<!-- salt-mutation-testing-report -->";
            body = `${marker}\n${body}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload mutation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: salt-mutation-results
          path: |
            target/mutants/mutants.out
            target/mutants.diff
            mutation-report.md
          if-no-files-found: ignore

  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    outputs:
      hygiene: ${{ steps.filter.outputs.hygiene }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hygiene:
              - 'mutants/suppressions.toml'
              - 'scripts/mutation_*.py'
              - 'scripts/mutation_*.sh'
              - '.cargo/mutants.toml'
              - 'salt/src/**'

  orphan-suppressions:
    name: suppression hygiene
    needs: changes
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.changes.outputs.hygiene == 'true')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants@27.1.0

      - name: Build full mutant universe
        run: cargo mutants --list --package salt --colors never > universe.txt

      - name: Check for orphan suppressions
        run: |
          python3 scripts/mutation_gate.py orphans \
            --suppressions mutants/suppressions.toml \
            --universe universe.txt
