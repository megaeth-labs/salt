name: quality-reports

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-reports-${{ github.ref }}
  cancel-in-progress: false

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Toolchain version from rust-toolchain.toml; add llvm-tools for cargo-llvm-cov
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview

      # Speed up builds by caching Cargo registry/git/target
      - uses: Swatinem/rust-cache@v2

      # Fast install of cargo-llvm-cov (prebuilt) instead of building from source
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Run instrumented tests once (produces .profraw data)
      - name: Run instrumented tests
        run: cargo llvm-cov --features test-bucket-resize --workspace --branch --doctests --no-report

      # Generate LCOV report for Codecov
      - name: Generate LCOV report
        run: cargo llvm-cov report --lcov --output-path lcov.info

      # Generate HTML report for GitHub Pages
      - name: Generate HTML report
        run: cargo llvm-cov report --html

      # Make the browsable HTML available as a build artifact (useful for PRs)
      - name: Upload HTML report (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: target/llvm-cov/html

      # Upload LCOV to Codecov
      - name: Upload LCOV to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  perf-benchmark:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: blacksmith-32vcpu-ubuntu-2404
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify benchmark host
        shell: bash
        run: |
          echo "=== nproc ==="
          nproc
          echo
          echo "=== lscpu ==="
          lscpu
          echo
          echo "=== /proc/cpuinfo model name ==="
          grep -m 1 "model name" /proc/cpuinfo
          echo
          echo "=== /proc/cpuinfo MHz ==="
          grep -m 1 "cpu MHz" /proc/cpuinfo || true

      - name: Install toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: perf-${{ hashFiles('**/Cargo.lock') }}

      - name: Run cargo bench
        run: cargo bench -- "update 10000 KVs" | tee output.txt

      - name: Generate latest main baseline
        run: python3 .github/scripts/parse_cargo_bench.py output.txt latest-main.json

      - name: Upload latest main baseline
        uses: actions/upload-artifact@v4
        with:
          name: latest-main-baseline
          path: latest-main.json

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir

      - name: Publish benchmark history and chart to GitHub Pages
        shell: bash
        run: |
          COMMIT_SHORT=$(echo "$GITHUB_SHA" | cut -c1-7)
          COMMIT_DATE=$(git log -1 --format=%as)

          mkdir -p gh-pages-dir/benchmarks

          python3 .github/scripts/append_benchmark_history.py \
            latest-main.json \
            gh-pages-dir/benchmarks/data.json \
            "$COMMIT_SHORT" \
            "$COMMIT_DATE"

          cp .github/pages/benchmark-chart.html gh-pages-dir/benchmarks/index.html
          cp latest-main.json gh-pages-dir/benchmarks/latest-main.json

          cd gh-pages-dir
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add benchmarks/
          git commit -m "Update benchmark for ${GITHUB_SHA}" || exit 0
          git push origin gh-pages

  # Publish the coverage report to gh-pages only from main
  deploy-pages:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    needs:
      - coverage
      - perf-benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: coverage-html
          path: ./public

      - name: Publish coverage report to gh-pages
        run: |
          git fetch origin gh-pages
          git switch --create gh-pages --track origin/gh-pages || git switch gh-pages
          rm -rf coverage
          mkdir -p coverage
          cp -R public/. coverage/
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add coverage
          git commit -m "Update coverage report for ${GITHUB_SHA}" || exit 0
          git push origin gh-pages:gh-pages

      - name: Print Pages links
        run: |
          SITE_BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          {
            echo "## Pages Links"
            echo
            echo "- [Coverage report](${SITE_BASE_URL}/coverage/)"
            echo "- [Benchmark dashboard](${SITE_BASE_URL}/benchmarks/)"
          } >> "$GITHUB_STEP_SUMMARY"
